spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dream_collection?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 이미 schema_part1~6.sql로 테이블을 직접 만들었으므로 validate 권장
      # (update로 하면 Entity 기준으로 Hibernate가 스키마를 임의 변경할 수 있음)
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

jwt:
  # TODO: 실제 배포 시 반드시 환경변수로 분리하고 최소 32자 이상의 랜덤 문자열 사용
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-chars}
  expiration-ms: 86400000 # 24시간

# ── 인증번호 발송 설정 ─────────────────────────────────────
# mock: 콘솔 로그로만 출력 (로컬 개발용, 기본값)
# 실제 배포 시 provider를 바꾸고 아래 값들을 채워주세요.

mail:
  provider: mock   # mock | smtp

# provider: smtp 로 바꿀 때, 맨 위 spring: 블록(1번 줄) 아래에 mail: 을 추가하세요
# 예:
# spring:
#   datasource: ...
#   jpa: ...
#   mail:
#     host: smtp.gmail.com
#     port: 587
#     username: ${MAIL_USERNAME}
#     password: ${MAIL_PASSWORD}   # Gmail은 '앱 비밀번호' 발급 필요 (일반 로그인 비밀번호 아님)
#     properties:
#       mail:
#         smtp:
#           auth: true
#           starttls:
#             enable: true

sms:
  provider: mock   # mock | aligo

# provider: aligo 로 바꿀 때, 위 sms: 아래에 이렇게 추가하세요
#   aligo:
#     api-key: ${ALIGO_API_KEY}
