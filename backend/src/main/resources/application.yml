server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/dream_collection?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      # board_post.category 컬럼 타입 이슈 정리 전까지 임시로 none 사용 중
      # (정리 완료되면 validate로 되돌릴 것)
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:dudwo1410@nate.com}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# 인증번호 발송 방식 (mail.provider: mock | smtp) — SmtpEmailSender/MockEmailSender가 참조하는 실제 키
mail:
  provider: smtp

jwt:
  # TODO: 실제 배포 시 반드시 환경변수로 분리하고 최소 32자 이상의 랜덤 문자열 사용
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-chars}
  expiration-ms: 86400000 # 24시간

# ── 인증번호 발송 설정 ─────────────────────────────────────
sms:
  provider: solapi   # mock | aligo | solapi
  solapi:
    api-key: ${SOLAPI_API_KEY:}
    api-secret: ${SOLAPI_API_SECRET:}
    sender: ${SOLAPI_SENDER:}

cors:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:5173

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:dummy-client-id-for-local-dev}
    client-secret: ${KAKAO_CLIENT_SECRET:a4fb2cc080df0e7a9304360d6926ac64}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/oauth/callback/kakao}

toss:
  secret-key: ${TOSS_SECRET_KEY:test_sk_dummy_for_local_dev}
  client-key: ${TOSS_CLIENT_KEY:test_ck_dummy_for_local_dev}

# ── 홈페이지 AI 챗봇 (Anthropic Claude API) ────────────────────
# console.anthropic.com에서 발급받은 키를 환경변수 ANTHROPIC_API_KEY로 설정하면 실제 대화가 가능해짐.
# 비어있으면 챗봇이 "관리자가 API 키를 설정해야 해요" 안내 문구만 반환함(에러는 안 남).
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-sonnet-5}

# ── 관리자 이미지 업로드(배너/메인배경/이달의 여행지) 로컬 저장 설정 ──────
# dir: 서버가 파일을 실제로 저장하는 디스크 경로 (프로젝트 루트 기준 상대경로)
# public-base-url: 저장된 파일에 접근할 때 쓰는 공개 URL의 앞부분
#                  (배포 시 실제 도메인으로 바꿔줘야 함, 예: https://api.dreamcollection.com)
upload:
  dir: uploads
  public-base-url: ${UPLOAD_PUBLIC_BASE_URL:http://localhost:8080}