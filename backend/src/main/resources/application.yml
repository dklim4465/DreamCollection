server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dream_collection?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # board_post.category 컬럼 타입 이슈 정리 전까지 임시로 none 사용 중
      # (정리 완료되면 validate로 되돌릴 것)
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:dudwo1410@nate.com}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# 인증번호 발송 방식 (mail.provider: mock | smtp) — SmtpEmailSender/MockEmailSender가 참조하는 실제 키
mail:
  provider: smtp

jwt:
  # TODO: 실제 배포 시 반드시 환경변수로 분리하고 최소 32자 이상의 랜덤 문자열 사용
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-chars}
  expiration-ms: 86400000 # 24시간

# ── 인증번호 발송 설정 ─────────────────────────────────────
sms:
  provider: solapi   # mock | aligo | solapi
  solapi:
    api-key: ${SOLAPI_API_KEY:}
    api-secret: ${SOLAPI_API_SECRET:}
    sender: ${SOLAPI_SENDER:}

cors:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:5173

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:dummy-client-id-for-local-dev}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/oauth/callback/kakao}

toss:
  secret-key: ${TOSS_SECRET_KEY:test_sk_dummy_for_local_dev}
  client-key: ${TOSS_CLIENT_KEY:test_ck_dummy_for_local_dev}