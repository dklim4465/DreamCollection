# .env 파일을 property source로 불러옴 (KAKAO_CLIENT_ID 등 실제 키값은 .env 참고)
# 주의: 예전에 "importl" / "fie:" 오타가 있어서 .env가 전혀 로딩되지 않고 있었음 (서버 기동 실패의 원인)
spring.config.import=optional:file:./.env[.properties]

spring.application.name=backend

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/dreamConnection
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

logging.level.org.hibernate.SQL=debug
logging.level.org.springframework.security.web=trace

spring.servlet.multipart.max-request-size=1GB
spring.servlet.multipart.max-file-size=20MB

com.upload.path=upload
upload.dir=upload

serpapi.base-url=https://serpapi.com/search
serpapi.api-key=${SERPAPI_API_KEY:}

spring.mail.provider=mock

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:dudwo1410@nate.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# 하단 "문의하기" 폼에서 접수된 건의사항/버그신고가 도착할 주소.
# 기본값은 mail.username과 같지만, 다른 주소로 받고 싶으면 ADMIN_EMAIL 환경변수로 바꾸면 됨.
app.admin-email=${ADMIN_EMAIL:${spring.mail.username}}

# 실제 배포 시 반드시 환경변수로 분리하고 최소 32자 이상의 랜덤 문자열 사용
jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-chars}

# 24시간
jwt.expiration-ms=86400000

sms.solapi.api-key=${SOLAPI_API_KEY}
sms.solapi.api-secret=${SOLAPI_API_SECRET}
sms.solapi.sender=${SOLAPI_SENDER}

oauth.kakao.client-id=${KAKAO_CLIENT_ID}
oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET}
oauth.kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:3000/oauth/callback/kakao}

toss.secret-key=${TOSS_SECRET_KEY}
toss.client-key=${TOSS_CLIENT_KEY}

gemini.api-key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-3.5-flash}

cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173

ai.server.base-url=http://127.0.0.1:5000